openapi: 3.0.3
info:
  title: Surge Loan Activity Log API
  version: 0.5.0
  description: |
    HTTP API backing agent activity logs and admin summaries.

    Agents (JWT `user` role, not `admin`) submit daily rows via `POST /activity/daily`. They list only their rows with filters and summaries via **`GET /activity/daily/me`**. Admins (`admin` JWT) list all agents (**`GET /activity/daily`**, optional **`agent_uuid`**) with the same filters, pagination, and aggregate **`summary`** (totals scoped to matching filters).

    Idempotent dev admin provisioning: run `npm run db:seed` after migrations (see `SEED_ADMIN_*` in `.env.example`).

    User onboarding exposes `/auth/register` with Argon2id-backed passwords and a short-lived JWT access token in JSON.
    The rotating refresh token is issued only as an HttpOnly `surge_refresh` cookie (Path `/auth`), not in response bodies, so browser JS cannot read it alongside the access token.
    Opaque refresh entries live in Redis. Roles (`user`, `admin`) attach at signup; elevate admins via DB or a future admin API.

    Password reset issues a single-use token (hashed in Postgres); configure SMTP (`EMAIL_MODE=smtp`) or use `EMAIL_MODE=console` locally to log reset links. The SPA URL base is `PASSWORD_RESET_URL_BASE` (query `token=` is appended). Successful reset revokes all refresh sessions for that user in Redis.

    Sharing these docs publicly

    Deploy this service, then anyone with the HTTPS URL may use:

    * `/api-docs` — interactive Swagger UI (share link to this path).
    * `/openapi.json` — OpenAPI 3 JSON (Swagger Editor URL import, Postman, codegen).
    * `/openapi.yaml` — same spec as YAML.

    Both spec endpoints attach `Access-Control-Allow-Origin: *` so browsers on other sites may fetch the description (Swagger Editor, etc.) as long as your API URL is reachable. Update the `servers` entry below once you pick a canonical base URL (for display only—the server still serves whichever host resolves).

    Offline: paste or upload `openapi.yaml` from repo root into [Swagger Editor](https://editor.swagger.io/).
servers:
  - url: http://localhost:3000
    description: Local / development (replace after deployment)
paths:
  /openapi.yaml:
    get:
      tags: [Documentation]
      summary: OpenAPI 3 YAML document
      description: Public YAML copy suitable for SCM, Postman URL import where supported.
      responses:
        "200":
          description: OpenAPI YAML
          content:
            application/yaml:
              schema:
                type: string
  /openapi.json:
    get:
      tags: [Documentation]
      summary: OpenAPI 3 JSON document
      description: Public JSON preferred by many toolchain integrations.
      responses:
        "200":
          description: OpenAPI schema as JSON object
          content:
            application/json:
              schema:
                type: object
  /health:
    get:
      summary: Process health
      tags: [System]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
  /ready:
    get:
      summary: Dependency readiness (Postgres + Redis)
      tags: [System]
      responses:
        "200":
          description: Postgres and Redis reachable
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ready
                  postgres:
                    type: boolean
                    example: true
                  redis:
                    type: boolean
                    example: true
        "500":
          description: Postgres or Redis unreachable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /auth/register:
    post:
      tags: [Auth]
      summary: Sign up — default role user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Account created — access JWT JSON plus HttpOnly refresh cookie surge_refresh (not in body)
          headers:
            Set-Cookie:
              description:
                surge_refresh opaque token HttpOnly SameSite=Lax Path /auth rotates on each login or refresh Secure in production
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccessTokensResponse"
        "409":
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Payload validation failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Too many signup attempts (rate limited)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /auth/login:
    post:
      tags: [Auth]
      summary: Email + password login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CredentialsRequest"
      responses:
        "200":
          description: Access JWT JSON plus HttpOnly refresh cookie surge_refresh
          headers:
            Set-Cookie:
              description:
                surge_refresh rotates on login or refresh
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccessTokensResponse"
        "401":
          description: Invalid email or password
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Payload validation failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Too many attempts (rate limited)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /auth/forgot-password:
    post:
      tags: [Auth]
      summary: Request password reset email
      description: |
        Always returns `202` with the same message whether the email is registered (prevents account enumeration).
        Rate limited more tightly than login. If the account exists, a single-use token is emailed (or logged when `EMAIL_MODE=console`).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordRequest"
      responses:
        "202":
          description: Request accepted — check email if an account exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForgotPasswordResponse"
        "422":
          description: Payload validation failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Too many reset requests (rate limited)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /auth/reset-password:
    post:
      tags: [Auth]
      summary: Set a new password using email token
      description: |
        Body carries the raw `token` from the reset link (`?token=`). On success, password is updated, the token is consumed,
        other pending reset tokens for the user are cleared, and all Redis refresh slots for the user are revoked.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordRequest"
      responses:
        "204":
          description: Password updated; token invalidated
        "400":
          description: Invalid or expired reset token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Payload validation failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Too many reset attempts (rate limited)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /auth/refresh:
    post:
      tags: [Auth]
      summary: Rotate refresh cookie and issue a fresh access JWT
      description:
        Requires the surge_refresh cookie from register or login. Send credentials (browser Cookie header). No JSON body.
      responses:
        "200":
          description: Access JWT refreshed; replaces surge_refresh cookie (rotating session)
          headers:
            Set-Cookie:
              description: Updated surge_refresh
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccessTokensResponse"
        "401":
          description: Missing invalid or revoked refresh cookie
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /auth/logout:
    post:
      tags: [Auth]
      summary: Revoke Redis refresh slot clear HttpOnly cookie
      description:
        Reads surge_refresh cookie if present clears cookie regardless. Idempotent.
      responses:
        "204":
          description: Session slot cleared cookie expired client-side
          headers:
            Set-Cookie:
              description: surge_refresh cleared
              schema:
                type: string
  /auth/me:
    get:
      tags: [Auth]
      summary: Current user profile — requires Bearer access JWT
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Public profile snapshot (never includes password_hash)
          content:
            application/json:
              schema:
                type: object
                required:
                  - user
                properties:
                  user:
                    $ref: "#/components/schemas/UserPublic"
        "401":
          description: Missing, malformed, or expired access JWT
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: JWT valid but backing user row disappeared
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      tags: [Auth]
      summary: Update current user profile
      description: |
        At least one of `full_name`, `location_station`, or `email` must be provided. Changing `email` clears `email_verified_at` until a future verification flow exists.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchMeRequest"
      responses:
        "200":
          description: Updated public profile
          content:
            application/json:
              schema:
                type: object
                required:
                  - user
                properties:
                  user:
                    $ref: "#/components/schemas/UserPublic"
        "401":
          description: Missing, malformed, or expired access JWT
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: JWT valid but backing user row disappeared
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Updated email already in use
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Payload validation failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /activity/daily/me:
    get:
      tags: [Activities]
      summary: List my daily activity updates — agent only
      description: |
        Bearer JWT — requires `user` and must not include `admin`. Rows are scoped to the authenticated user.
        `summary` aggregates over **all matching rows** (after filters), not only the current page.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ActivityListPage"
        - $ref: "#/components/parameters/ActivityPageSize"
        - $ref: "#/components/parameters/ActivityDateFrom"
        - $ref: "#/components/parameters/ActivityDateTo"
        - $ref: "#/components/parameters/ActivityLoanMin"
        - $ref: "#/components/parameters/ActivityLoanMax"
        - $ref: "#/components/parameters/ActivityLocationFilter"
        - $ref: "#/components/parameters/ActivityNameFilter"
      responses:
        "200":
          description: Paginated list with summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyActivityListResponse"
        "401":
          description: Missing malformed or expired access JWT
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Caller must be an agent (not administrator)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Invalid query parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /activity/daily:
    post:
      tags: [Activities]
      summary: Submit agent daily activity
      description: |
        Bearer access JWT required. Callers must be agents (JWT includes `user` and must not include `admin`).
        `agent_uuid` must equal the JWT subject (authenticated user id). Duplicate `(agent_uuid, update_date)` returns 409.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDailyActivityRequest"
      responses:
        "201":
          description: Daily activity recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateDailyActivityResponse"
        "401":
          description: Missing malformed or expired access JWT
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Not an agent forbidden agent_uuid mismatch admin-only account
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Activity for this reporting date already exists for this agent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Payload validation failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      tags: [Activities]
      summary: List daily activity updates for all agents — admin only
      description: |
        Bearer JWT — requires `admin`. Optional **`agent_uuid`** narrows rows to one agent.
        **`summary`** reflects all rows matching filters (excluding pagination).
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ActivityListPage"
        - $ref: "#/components/parameters/ActivityPageSize"
        - $ref: "#/components/parameters/ActivityDateFrom"
        - $ref: "#/components/parameters/ActivityDateTo"
        - $ref: "#/components/parameters/ActivityLoanMin"
        - $ref: "#/components/parameters/ActivityLoanMax"
        - $ref: "#/components/parameters/ActivityLocationFilter"
        - $ref: "#/components/parameters/ActivityNameFilter"
        - $ref: "#/components/parameters/ActivityAgentUuidFilter"
      responses:
        "200":
          description: Paginated list with summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyActivityListResponse"
        "401":
          description: Missing malformed or expired access JWT
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Caller is not an admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Invalid query parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
tags:
  - name: Documentation
    description: Public API description files (Swagger / codegen).
  - name: System
    description: Operational endpoints
  - name: Auth
    description: Registration, login, JWT access, HttpOnly refresh rotation, logout, password reset email, and profile read/update
  - name: Activities
    description: Agent daily activity (submit; agents GET `/daily/me`; admins GET `/daily`)
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description:
        Access JWT goes in Authorization Bearer. Obtain it via /auth/register, /auth/login,
        or /auth/refresh. Long-lived rotation uses the HttpOnly surge_refresh cookie (never returned in JSON).
  parameters:
    ActivityListPage:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
      description: 1-based page index
    ActivityPageSize:
      name: page_size
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
      description: Rows per page (max 100)
    ActivityDateFrom:
      name: date_from
      in: query
      required: false
      schema:
        type: string
        format: date
        pattern: '^\\d{4}-\\d{2}-\\d{2}$'
      description: Inclusive lower bound on reporting `update_date`
    ActivityDateTo:
      name: date_to
      in: query
      required: false
      schema:
        type: string
        format: date
        pattern: '^\\d{4}-\\d{2}-\\d{2}$'
      description: Inclusive upper bound on reporting `update_date` (must be on or after `date_from` when both sent)
    ActivityLoanMin:
      name: loan_min
      in: query
      required: false
      schema:
        type: number
        format: double
        minimum: 0
      description: Inclusive minimum `loan_amount` (total_amount) filter
    ActivityLoanMax:
      name: loan_max
      in: query
      required: false
      schema:
        type: number
        format: double
        minimum: 0
      description: Inclusive maximum loan filter (must be >= `loan_min` when both sent)
    ActivityLocationFilter:
      name: location
      in: query
      required: false
      schema:
        type: string
        minLength: 1
        maxLength: 200
      description: Case-insensitive substring match on stored location
    ActivityNameFilter:
      name: name
      in: query
      required: false
      schema:
        type: string
        minLength: 1
        maxLength: 200
      description: Case-insensitive substring match on agent full name snapshot
    ActivityAgentUuidFilter:
      name: agent_uuid
      in: query
      required: false
      schema:
        type: string
        format: uuid
      description: Admin-only — restrict results to one agent (`agent_user_id`)
  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
    RegisterRequest:
      type: object
      required:
        - full_name
        - email
        - password
        - location_station
      properties:
        full_name:
          type: string
          maxLength: 200
          example: "Jamie Rivera"
        email:
          type: string
          format: email
          maxLength: 320
          example: "jamie@example.com"
        password:
          type: string
          minLength: 12
          maxLength: 200
          format: password
          description: Argon2id hash stored server-side; minimum 12 characters in v1
        location_station:
          type: string
          maxLength: 200
          example: "North Station Desk 4"
    CredentialsRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    ForgotPasswordRequest:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          format: email
          maxLength: 320
    ForgotPasswordResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          example: If an account exists for that email, you will receive password reset instructions.
    ResetPasswordRequest:
      type: object
      required:
        - token
        - password
      properties:
        token:
          type: string
          description: Raw token from the reset link query string
          maxLength: 512
        password:
          type: string
          format: password
          minLength: 12
          maxLength: 200
    PatchMeRequest:
      type: object
      description: At least one property must be present
      properties:
        full_name:
          type: string
          minLength: 1
          maxLength: 200
        location_station:
          type: string
          minLength: 1
          maxLength: 200
        email:
          type: string
          format: email
          maxLength: 320
      minProperties: 1
    AccessTokensResponse:
      type: object
      description: Access JWT payload only refresh token is never included (HttpOnly cookie instead)
      required:
        - user
        - access_token
        - expires_in
      properties:
        user:
          $ref: "#/components/schemas/UserPublic"
        access_token:
          type: string
          description: HS256 JWT including roles — short-lived
        expires_in:
          type: integer
          description: Access TTL seconds
          example: 900
    UserPublic:
      type: object
      required:
        - id
        - email
        - full_name
        - location_station
        - roles
        - email_verified_at
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        full_name:
          type: string
        location_station:
          type: string
        roles:
          type: array
          items:
            type: string
            example: user
          description: Role codes intersected by `requireRoles` middleware (`user`, seeded `admin` available)
        email_verified_at:
          type: string
          format: date-time
          nullable: true
          description: Set when SMTP verification arrives (null in onboarding v1)
    CreateDailyActivityRequest:
      type: object
      required:
        - agent_uuid
        - agent_full_name
        - location
        - applications_count
        - loan_amount
        - update_date
      additionalProperties: false
      properties:
        agent_uuid:
          type: string
          format: uuid
          description: Must equal the JWT subject (`user.id`)
        agent_full_name:
          type: string
          minLength: 1
          maxLength: 200
          example: "Jamie Rivera"
        location:
          type: string
          minLength: 1
          maxLength: 200
          example: "North Station Desk 4"
        applications_count:
          type: integer
          minimum: 0
          example: 8
        loan_amount:
          type: number
          format: double
          minimum: 0
          example: 125000.50
        update_date:
          type: string
          format: date
          pattern: '^\\d{4}-\\d{2}-\\d{2}$'
          description: Reporting calendar date (YYYY-MM-DD)
          example: "2026-05-17"
    DailyActivityPublic:
      type: object
      required:
        - id
        - agent_user_id
        - agent_full_name
        - location
        - applications_count
        - loan_amount
        - update_date
        - created_at
      properties:
        id:
          type: string
          format: uuid
        agent_user_id:
          type: string
          format: uuid
        agent_full_name:
          type: string
        location:
          type: string
        applications_count:
          type: integer
          minimum: 0
        loan_amount:
          type: number
          format: double
          minimum: 0
        update_date:
          type: string
          format: date
          example: "2026-05-17"
        created_at:
          type: string
          format: date-time
    CreateDailyActivityResponse:
      type: object
      required:
        - daily_activity
      properties:
        daily_activity:
          $ref: "#/components/schemas/DailyActivityPublic"
    DailyActivityListRow:
      type: object
      description: Snapshot row for dashboards (distinct field names from create response)
      required:
        - id
        - agent_uuid
        - agent_full_name
        - location
        - applications
        - total_amount
        - submitted
        - date
      properties:
        id:
          type: string
          format: uuid
        agent_uuid:
          type: string
          format: uuid
        agent_full_name:
          type: string
        location:
          type: string
        applications:
          type: integer
          minimum: 0
          description: Stored `applications_count` at submission time
        total_amount:
          type: number
          format: double
          minimum: 0
          description: Stored `loan_amount` at submission time
        submitted:
          type: string
          format: date-time
          description: Submission timestamp (`created_at`)
        date:
          type: string
          format: date
          description: Reporting `update_date` (YYYY-MM-DD)
    DailyActivityPagination:
      type: object
      required:
        - page
        - page_size
        - total_items
        - total_pages
      properties:
        page:
          type: integer
          minimum: 1
        page_size:
          type: integer
          minimum: 1
          maximum: 100
        total_items:
          type: integer
          minimum: 0
          description: Count of matching rows across all pages for current filters
        total_pages:
          type: integer
          minimum: 1
          description: Derived from total_items — at least one page returned even when empty
    DailyActivitySummary:
      type: object
      required:
        - total_updates
        - total_loan_amount
        - total_applications
      properties:
        total_updates:
          type: integer
          minimum: 0
          description: Count of matching rows (same denominator as pagination total_items)
        total_loan_amount:
          type: number
          format: double
          minimum: 0
          description: Sum of matching `loan_amount` values
        total_applications:
          type: integer
          minimum: 0
          description: Sum of matching `applications_count` values
        last_update:
          type: string
          format: date-time
          nullable: true
          description: Latest `created_at` among matching rows (`null` when no matches)
    DailyActivityListResponse:
      type: object
      required:
        - items
        - pagination
        - summary
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/DailyActivityListRow"
        pagination:
          $ref: "#/components/schemas/DailyActivityPagination"
        summary:
          $ref: "#/components/schemas/DailyActivitySummary"